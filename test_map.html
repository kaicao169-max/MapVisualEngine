    <style>
    .my-pulse {
        width: 16px;
        height: 16px;
        background-color: var(--bg-color);
        border-radius: 50%;
        box-shadow: 0 0 0 0 var(--shadow-color);
        animation: pulse var(--anim-dur) infinite;
    }
    @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 var(--shadow-color); }
        70% { transform: scale(1); box-shadow: 0 0 var(--blur-radius) var(--spread-radius) rgba(0,0,0,0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 var(--shadow-color); }
    }

    @media (max-width: 600px) {
        .my-pulse {
            width: 20px;
            height: 20px;
        }
    }
</style>
    <style>
    .my-unique-legend {
        position: fixed;      
        bottom: 30px !important;            
        right: 30px !important; 
        background: white !important; 
        padding: 15px !important; 
        border-radius: 10px !important;                         
        border: 2px solid black !important;      
        z-index: 9999 !important;
        min-width: 140px !important; 
    }

    .legend-title {
        display: block !important;     
        margin-bottom: 10px !important; /* 控制标题到下方图例的距离，调小点 */       
        text-align: center !important;    
        font-size: 16px !important; 
        color: #333 !important; 
        border-bottom: 1px solid #ccc !important; 
        padding-bottom: 5px !important; 
    }

    /* 3. 每一行图例项：控制色块和文字的距离 */
    .legend-row {
        display: flex !important;       /* 开启弹性盒子 */
        align-items: center !important; /* 垂直居中 */
        margin: 6px 0 !important;       /* 行间距 */
    }
    
    .legend-color-box {
        background: var(--box-color) !important;
        width: 12px;
        height: 12px;
        display: inline-block !important;
        border-radius: 3px;
        vertical-align: middle;
        margin-right: 20px !important;  /* 增加色块和文字的距离 */
        flex-shrink: 0;
    }

    .legend-font {
        color: var(--box-color) !important; 
        font-weight: bold !important;
        font-size: 13px !important;
    }

    @media (max-width: 600px) {
        .my-unique-legend {
            right: 10px !important;
            left: 10px !important;     /* 两边留出空隙 */
            width: auto !important;
            max-width: 320px !important; /* 给它一个上限，超过这个宽度就别再撑了 */
            margin: 0 auto !important;   /* 居中显示 */
            bottom: 20px !important;
            padding: 8px !important;    /* 稍微缩小一点内边距，更紧凑 */
            font-size: 13px !important;  /* 适当调小字体 */
        }
        /* 如果手机上觉得标题太大，可以在这里改，其他的 class 都不用动 */
        .legend-title {
            font-size: 14px !important;
            margin-bottom: 8px !important;
        }

        .legend-row {
            margin: 8px 0 !important;
            background: #f8f9fa !important;
            padding: 5px !important;
            border-radius: 6px !important;
        }
    }
</style>
